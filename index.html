<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RetroGPT Installer</title>

<style>
body {
  margin: 0;
  font-family: "Courier New", monospace;
  background: black;
  color: #00ffcc;
  overflow: hidden;
}

/* Boot screen */
#boot {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  padding: 20px;
  white-space: pre-line;
}

.cursor {
  display: inline-block;
  width: 10px;
  background: #00ffcc;
  margin-left: 5px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% {opacity: 0;}
}

/* Installer UI */
#installer {
  display: none;
  padding: 30px;
  max-width: 900px;
  margin: auto;
}

.window {
  border: 2px solid #00ffcc;
  box-shadow: 0 0 20px #00ffcc;
  padding: 20px;
}

/* Progress bar */
.progress-container {
  margin-top: 20px;
  border: 1px solid #00ffcc;
  height: 20px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #00ffcc;
  transition: width 0.3s;
}

/* Steps */
.step {
  display: none;
  margin-top: 30px;
}

.image-slot img {
  width: 100%;
  border: 1px solid #00ffcc;
  margin-top: 10px;
}

/* Lightbox */
.lightbox {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
}

.lightbox img {
  max-width:90%;
  box-shadow:0 0 20px #00ffcc;
}

.lightbox.active {
  display:flex;
}
</style>
</head>

<body>

<!-- BOOT SCREEN -->
<div id="boot"></div>

<!-- INSTALLER -->
<div id="installer">
  <div class="window">
    <h2>RetroGPT Setup v1.1.0</h2>
    <p>Initializing installation...</p>

    <div class="progress-container">
      <div class="progress-bar" id="bar"></div>
    </div>

    <!-- STEPS -->
    <div class="step" id="step1">
      <h3>01 • DOWNLOAD</h3>
      <p>Download the release package.</p>
      <div class="image-slot" onclick="openLightbox()">
        <img src="demo/demo.png">
      </div>
    </div>

    <div class="step" id="step2">
      <h3>02 • EXTRACT</h3>
      <p>Extract files into a folder.</p>
      <div class="image-slot" onclick="openLightbox()">
        <img src="demo/demo.png">
      </div>
    </div>

    <div class="step" id="step3">
      <h3>03 • EXTENSIONS</h3>
      <p>Open chrome://extensions/</p>
      <div class="image-slot" onclick="openLightbox()">
        <img src="demo/demo.png">
      </div>
    </div>

    <div class="step" id="step4">
      <h3>04 • DEV MODE</h3>
      <p>Enable Developer Mode.</p>
      <div class="image-slot" onclick="openLightbox()">
        <img src="demo/demo.png">
      </div>
    </div>

    <div class="step" id="step5">
      <h3>05 • LOAD</h3>
      <p>Click Load Unpacked.</p>
      <div class="image-slot" onclick="openLightbox()">
        <img src="demo/demo.png">
      </div>
    </div>

    <div class="step" id="step6">
      <h3>06 • COMPLETE</h3>
      <p>RetroGPT is now active.</p>
      <div class="image-slot" onclick="openLightbox()">
        <img src="demo/demo.png">
      </div>
    </div>

  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img src="demo/demo.png">
</div>

<script>
/* Boot typing effect */
const bootText = `
RetroGPT BIOS v1.1.0
Copyright (C) Retro Systems

Initializing memory... OK
Loading modules... OK
Starting installer...
`;

let i = 0;
function typeBoot() {
  if (i < bootText.length) {
    document.getElementById("boot").innerHTML += bootText.charAt(i);
    i++;
    setTimeout(typeBoot, 20);
  } else {
    setTimeout(startInstaller, 800);
  }
}

function startInstaller() {
  document.getElementById("boot").style.display = "none";
  document.getElementById("installer").style.display = "block";
  runProgress();
}

/* Progress simulation */
let progress = 0;
function runProgress() {
  let bar = document.getElementById("bar");

  let interval = setInterval(() => {
    progress += Math.random() * 15;
    if (progress >= 100) {
      progress = 100;
      clearInterval(interval);
      showSteps();
    }
    bar.style.width = progress + "%";
  }, 400);
}

/* Reveal steps */
function showSteps() {
  let step = 1;
  let interval = setInterval(() => {
    let el = document.getElementById("step" + step);
    if (el) {
      el.style.display = "block";
      step++;
    } else {
      clearInterval(interval);
    }
  }, 600);
}

/* Lightbox */
function openLightbox() {
  document.getElementById("lightbox").classList.add("active");
}
function closeLightbox() {
  document.getElementById("lightbox").classList.remove("active");
}

typeBoot();
</script>

</body>
</html>
