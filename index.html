<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RetroGPT Installer</title>
<style>
body {
  margin: 0;
  font-family: "Courier New", monospace;
  background: #001100;
  color: #00ff00;
  overflow-y: auto;
}

/* Boot screen top-left typing */
#boot {
  width: 100%;
  height: 100vh;
  background: #001100;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: flex-start;
  padding: 20px;
  white-space: pre-line;
  font-size: 18px;
  line-height: 1.4;
}

.cursor {
  display: inline-block;
  width: 10px;
  background: #00ff00;
  margin-left: 2px;
  animation: blink 1s infinite;
}

@keyframes blink { 50% { opacity: 0; } }

/* Installer container centered */
#installer {
  display: none;
  padding: 30px;
  max-width: 900px;
  margin: 60px auto;
  background: rgba(0,17,0,0.95);
  border: 2px solid #00ff00;
  box-shadow: 0 0 25px #00ff00;
  text-align: center;
}

.progress-container {
  margin: 20px auto;
  border: 1px solid #00ff00;
  height: 20px;
  width: 80%;
  background: #001100;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #00ff00;
  transition: width 0.3s;
}

.step {
  display: none;
  margin-top: 30px;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.step.show {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

.step h3 {
  margin: 0;
  color: #00ff00;
}

.step p {
  margin: 5px 0;
  color: #00ff99;
}

.image-slot {
  margin-top: 10px;
  border: 1px solid #00ff00;
  cursor: pointer;
  background: #001100;
}

.image-slot img {
  width: 100%;
  display: block;
  object-fit: contain;
  transition: transform 0.3s ease;
}

.image-slot:hover img {
  transform: scale(1.02);
}

.lightbox {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.4s ease;
  z-index: 1000;
}

.lightbox.active {
  opacity: 1;
  visibility: visible;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
  box-shadow: 0 0 30px #00ff00;
}

.scanlines {
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,255,0,0.05) 0px,
    rgba(0,255,0,0.05) 1px,
    transparent 2px,
    transparent 4px
  );
  pointer-events: none;
  z-index: 1;
}

footer {
  text-align: center;
  margin-top: 40px;
  color: #00ff00;
  opacity: 0.6;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="scanlines"></div>

<!-- Boot typing screen top-left -->
<div id="boot">
  <div id="bootText"></div>
  <span class="cursor"></span>
</div>

<!-- Installer container centered -->
<div id="installer">
  <h2>RetroGPT Installer v1.1.0</h2>
  <div class="progress-container">
    <div class="progress-bar" id="bar"></div>
  </div>

  <!-- Steps in correct order but slightly shuffled in HTML spacing -->
  <div class="step" id="step1">
    <h3>01 • DOWNLOAD</h3>
    <p>Download the release package.</p>
    <div class="image-slot" onclick="openLightbox('demo/download.png')">
      <img src="demo/download.png">
    </div>
  </div>

  <div class="step" id="step3">
    <h3>03 • EXTENSIONS</h3>
    <p>Open chrome://extensions/</p>
    <div class="image-slot" onclick="openLightbox('demo/extensions.png')">
      <img src="demo/extensions.png">
    </div>
  </div>

  <div class="step" id="step2">
    <h3>02 • EXTRACT</h3>
    <p>Extract files into a folder.</p>
    <div class="image-slot" onclick="openLightbox('demo/extract.png')">
      <img src="demo/extract.png">
    </div>
  </div>

  <div class="step" id="step5">
    <h3>05 • LOAD</h3>
    <p>Click Load Unpacked.</p>
    <div class="image-slot" onclick="openLightbox('demo/load.png')">
      <img src="demo/load.png">
    </div>
  </div>

  <div class="step" id="step4">
    <h3>04 • DEV MODE</h3>
    <p>Enable Developer Mode.</p>
    <div class="image-slot" onclick="openLightbox('demo/devmode.png')">
      <img src="demo/devmode.png">
    </div>
  </div>

  <div class="step" id="step6">
    <h3>06 • COMPLETE</h3>
    <p>RetroGPT is now active.</p>
    <div class="image-slot" onclick="openLightbox('demo/demo.png')">
      <img src="demo/demo.png">
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="">
</div>

<script>
const bootText = `
RetroGPT BIOS v1.1.0
Initializing memory... OK
Loading modules... OK
Hacker terminal interface activated
`;

let i = 0;
function typeBoot() {
  const bootEl = document.getElementById("bootText");
  if(i < bootText.length){
    bootEl.innerHTML += bootText.charAt(i);
    i++;
    setTimeout(typeBoot, 40);
  } else {
    setTimeout(startInstaller, 800);
  }
}

function startInstaller() {
  document.getElementById("boot").style.display = "none";
  document.getElementById("installer").style.display = "block";
  runProgress();
}

let progress = 0;
function runProgress() {
  const bar = document.getElementById("bar");
  const interval = setInterval(() => {
    progress += Math.random() * 15;
    if(progress >= 100){
      progress = 100;
      clearInterval(interval);
      showSteps();
    }
    bar.style.width = progress + "%";
  }, 300);
}

function showSteps() {
  const stepOrder = [1,2,3,4,5,6]; // display in correct order
  let index = 0;
  const interval = setInterval(() => {
    if(index >= stepOrder.length){
      clearInterval(interval);
      return;
    }
    const el = document.getElementById("step" + stepOrder[index]);
    if(el) el.classList.add("show");
    index++;
  }, 500);
}

function openLightbox(imgSrc){
  const lb = document.getElementById("lightbox");
  const lbImg = document.getElementById("lightboxImg");
  lbImg.src = imgSrc;
  lb.classList.add("active");
}

function closeLightbox(){
  document.getElementById("lightbox").classList.remove("active");
}

typeBoot();
</script>
</body>
</html>
